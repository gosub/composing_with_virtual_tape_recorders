<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 130" width="600" height="130" font-family="sans-serif" font-size="13">
  <!-- Technique F: Loops -->

  <!-- Simpliciter with loop indicators -->
  <rect x="150" y="20" width="140" height="90" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="220" y="44" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="220" y="62" text-anchor="middle" font-size="11" fill="#cc6600">LOOP mode ON</text>
  <text x="220" y="78" text-anchor="middle" font-size="11" fill="#555">START ←→ END</text>
  <text x="220" y="94" text-anchor="middle" font-size="10" fill="#888">fwd / ping-pong</text>

  <!-- Loop arrow back -->
  <path d="M 290 55 Q 380 10 380 65 Q 380 120 290 95" fill="none" stroke="#cc6600" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr4)"/>
  <text x="395" y="68" text-anchor="middle" font-size="11" fill="#cc6600">loops</text>

  <!-- Gate trigger -->
  <rect x="20" y="45" width="100" height="40" rx="6" fill="#e8f8e8" stroke="#336633" stroke-width="1.5"/>
  <text x="70" y="63" text-anchor="middle" font-weight="bold" font-size="11">Gate/Trigger</text>
  <text x="70" y="78" text-anchor="middle" font-size="10" fill="#555">to PLAY input</text>
  <line x1="120" y1="65" x2="148" y2="65" stroke="#336633" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Output -->
  <rect x="440" y="45" width="110" height="40" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="495" y="63" text-anchor="middle" font-weight="bold" font-size="12">Audio OUT</text>
  <text x="495" y="78" text-anchor="middle" font-size="11" fill="#555">endless loop</text>
  <line x1="290" y1="65" x2="438" y2="65" stroke="#333" stroke-width="2" marker-end="url(#arr4)"/>

  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
