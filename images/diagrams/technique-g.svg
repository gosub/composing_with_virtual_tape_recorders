<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" width="640" height="140" font-family="sans-serif" font-size="13">
  <!-- Technique G: Editing (START/END markers) -->

  <!-- Full sample waveform -->
  <rect x="20" y="20" width="220" height="50" rx="4" fill="#fff8ee" stroke="#cc6600" stroke-width="1.5"/>
  <text x="130" y="42" text-anchor="middle" font-size="11" fill="#555">Full recorded sample</text>
  <!-- Waveform decoration -->
  <polyline points="30,55 50,35 70,55 90,28 110,55 130,38 150,55 170,30 190,55 210,40 230,55" fill="none" stroke="#cc6600" stroke-width="1.5"/>

  <!-- START marker -->
  <line x1="70" y1="18" x2="70" y2="72" stroke="#009900" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="70" y="15" text-anchor="middle" font-size="10" fill="#009900" font-weight="bold">START</text>

  <!-- END marker -->
  <line x1="190" y1="18" x2="190" y2="72" stroke="#cc0000" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="190" y="15" text-anchor="middle" font-size="10" fill="#cc0000" font-weight="bold">END</text>

  <!-- Selection highlight -->
  <rect x="70" y="20" width="120" height="50" fill="#ccffcc" fill-opacity="0.35"/>

  <!-- Arrow -->
  <line x1="245" y1="45" x2="290" y2="45" stroke="#333" stroke-width="2" marker-end="url(#arr9)"/>
  <text x="268" y="38" text-anchor="middle" font-size="10" fill="#333">only this</text>
  <text x="268" y="58" text-anchor="middle" font-size="10" fill="#333">portion plays</text>

  <!-- Simpliciter -->
  <rect x="290" y="20" width="130" height="50" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="355" y="42" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="355" y="58" text-anchor="middle" font-size="11" fill="#555">START/END knobs</text>

  <!-- Arrow to DAW note -->
  <line x1="355" y1="70" x2="355" y2="95" stroke="#aa8800" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr9y)"/>
  <rect x="290" y="95" width="130" height="35" rx="4" fill="#fffacc" stroke="#aa8800" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="355" y="111" text-anchor="middle" font-size="10" fill="#aa8800" font-style="italic">or: export → Audacity</text>
  <text x="355" y="124" text-anchor="middle" font-size="10" fill="#aa8800" font-style="italic">for precise editing</text>

  <!-- Arrow to output -->
  <line x1="420" y1="45" x2="470" y2="45" stroke="#333" stroke-width="2" marker-end="url(#arr9)"/>

  <!-- Output -->
  <rect x="470" y="20" width="130" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="535" y="42" text-anchor="middle" font-weight="bold" font-size="12">Audio OUT</text>
  <text x="535" y="58" text-anchor="middle" font-size="11" fill="#555">selected region</text>

  <defs>
    <marker id="arr9" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arr9y" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aa8800"/>
    </marker>
  </defs>
</svg>
