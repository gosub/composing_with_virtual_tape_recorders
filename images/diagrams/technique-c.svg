<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" font-family="sans-serif" font-size="13">
  <!-- Technique C: Speed Change -->

  <!-- Simpliciter -->
  <rect x="200" y="20" width="120" height="120" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="260" y="48" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="260" y="66" text-anchor="middle" font-size="11" fill="#555">SPEED knob</text>
  <line x1="210" y1="80" x2="310" y2="80" stroke="#cc6600" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="260" y="96" text-anchor="middle" font-size="11" fill="#cc6600">V/Oct CV in</text>
  <text x="260" y="112" text-anchor="middle" font-size="11" fill="#555">OUT →</text>
  <text x="260" y="128" text-anchor="middle" font-size="10" fill="#888">pitch/time shifts</text>

  <!-- CV Source (LFO or manual) -->
  <rect x="20" y="60" width="110" height="50" rx="6" fill="#e8f8e8" stroke="#336633" stroke-width="1.5"/>
  <text x="75" y="82" text-anchor="middle" font-weight="bold" font-size="12">CV / LFO</text>
  <text x="75" y="98" text-anchor="middle" font-size="11" fill="#555">pitch control</text>

  <!-- Arrow CV → Simpliciter -->
  <line x1="130" y1="85" x2="198" y2="95" stroke="#336633" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="162" y="80" text-anchor="middle" font-size="10" fill="#336633">V/Oct</text>

  <!-- Audio In arrow -->
  <rect x="20" y="15" width="110" height="40" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="75" y="33" text-anchor="middle" font-weight="bold" font-size="12">Audio IN</text>
  <text x="75" y="48" text-anchor="middle" font-size="11" fill="#555">recorded sample</text>
  <line x1="130" y1="35" x2="198" y2="40" stroke="#333" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Output arrow -->
  <rect x="390" y="55" width="110" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="445" y="77" text-anchor="middle" font-weight="bold" font-size="12">Audio OUT</text>
  <text x="445" y="93" text-anchor="middle" font-size="11" fill="#555">pitch-shifted</text>
  <line x1="320" y1="100" x2="388" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr2)"/>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
