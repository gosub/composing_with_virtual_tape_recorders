<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" width="620" height="180" font-family="sans-serif" font-size="13">
  <!-- Technique E: Superimposition — two Simpliciters through a Mixer -->

  <!-- Simpliciter 1 -->
  <rect x="20" y="20" width="120" height="60" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="80" y="44" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter 1</text>
  <text x="80" y="62" text-anchor="middle" font-size="11" fill="#555">Sample A</text>

  <!-- Simpliciter 2 -->
  <rect x="20" y="100" width="120" height="60" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="80" y="124" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter 2</text>
  <text x="80" y="142" text-anchor="middle" font-size="11" fill="#555">Sample B</text>

  <!-- Arrows to Mixer -->
  <line x1="140" y1="50" x2="235" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="140" y1="130" x2="235" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Mixer -->
  <rect x="235" y="55" width="110" height="70" rx="6" fill="#e8e8ff" stroke="#444499" stroke-width="1.5"/>
  <text x="290" y="83" text-anchor="middle" font-weight="bold" font-size="12">VCV Mixer</text>
  <text x="290" y="99" text-anchor="middle" font-size="11" fill="#555">blend levels</text>
  <text x="290" y="115" text-anchor="middle" font-size="10" fill="#888">gain staging</text>

  <!-- Arrow to Saturation -->
  <line x1="345" y1="90" x2="388" y2="90" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Optional Saturation box -->
  <rect x="388" y="65" width="110" height="50" rx="6" fill="#fff0cc" stroke="#aa8800" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="443" y="86" text-anchor="middle" font-size="11" font-style="italic" fill="#aa8800">Console</text>
  <text x="443" y="102" text-anchor="middle" font-size="10" fill="#aa8800">(optional saturation)</text>

  <!-- Arrow to Output -->
  <line x1="498" y1="90" x2="538" y2="90" stroke="#333" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Output -->
  <rect x="538" y="65" width="70" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="573" y="87" text-anchor="middle" font-weight="bold" font-size="11">Audio</text>
  <text x="573" y="103" text-anchor="middle" font-size="11" fill="#555">OUT</text>

  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
