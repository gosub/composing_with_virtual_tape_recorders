<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 160" width="620" height="160" font-family="sans-serif" font-size="13">

  <!-- Microphone -->
  <rect x="10" y="55" width="90" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="55" y="77" text-anchor="middle" font-weight="bold" font-size="12">Micro-</text>
  <text x="55" y="93" text-anchor="middle" font-weight="bold" font-size="12">phone</text>

  <!-- Arrow mic → audio -->
  <line x1="100" y1="80" x2="138" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Audio Module -->
  <rect x="140" y="20" width="120" height="120" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="200" y="44" text-anchor="middle" font-weight="bold" font-size="12">Audio</text>
  <text x="200" y="60" text-anchor="middle" font-size="10" fill="#555">VCV module</text>
  <!-- OUT jacks label -->
  <text x="200" y="82" text-anchor="middle" font-size="11" fill="#336699">OUT 1/2 →</text>
  <line x1="170" y1="88" x2="250" y2="88" stroke="#336699" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- IN jacks label -->
  <text x="200" y="108" text-anchor="middle" font-size="11" fill="#cc6600">← IN 1/2</text>
  <text x="200" y="128" text-anchor="middle" font-size="10" fill="#888">audio interface</text>

  <!-- Arrow Audio OUT → Simpliciter IN (top path) -->
  <path d="M 260 72 Q 320 40 380 72" fill="none" stroke="#336699" stroke-width="2" marker-end="url(#arrb)"/>
  <text x="320" y="38" text-anchor="middle" font-size="10" fill="#336699">record signal</text>

  <!-- Arrow Simpliciter OUT → Audio IN (bottom path) -->
  <path d="M 380 108 Q 320 140 260 108" fill="none" stroke="#cc6600" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="320" y="152" text-anchor="middle" font-size="10" fill="#cc6600">playback signal</text>

  <!-- Simpliciter -->
  <rect x="380" y="20" width="130" height="120" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="445" y="48" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="445" y="65" text-anchor="middle" font-size="10" fill="#555">NYSTHI</text>
  <!-- IN jacks -->
  <text x="445" y="84" text-anchor="middle" font-size="11" fill="#336699">← IN L/R</text>
  <line x1="400" y1="90" x2="500" y2="90" stroke="#cc6600" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- OUT jacks -->
  <text x="445" y="108" text-anchor="middle" font-size="11" fill="#cc6600">OUT L/R →</text>
  <text x="445" y="128" text-anchor="middle" font-size="10" fill="#888">REC / PLAY</text>

  <!-- Arrow Simpliciter OUT → Speakers -->
  <line x1="510" y1="80" x2="548" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Speakers -->
  <rect x="550" y="55" width="60" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="580" y="77" text-anchor="middle" font-size="12">🔊</text>
  <text x="580" y="93" text-anchor="middle" font-size="10" fill="#555">output</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#336699"/>
    </marker>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc6600"/>
    </marker>
  </defs>
</svg>
