name: Release PDF

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - name: Build PDF
        run: nix-shell --run "make pdf"

      - name: Rename PDF with title, date and tag
        run: |
          TAG="${{ github.ref_name }}"
          DATE="$(date -u +%Y-%m-%d)"
          FILENAME="composing-with-virtual-tape-recorders-${DATE}-${TAG}.pdf"
          cp output/book.pdf "${FILENAME}"
          echo "PDF_FILE=${FILENAME}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            PDF build of *Composing with Virtual Tape Recorders* — ${{ github.ref_name }}
          files: ${{ env.PDF_FILE }}
