<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180" font-family="sans-serif" font-size="13">
  <!-- Technique H: Two-Channel Separate -->

  <!-- Simpliciter 1 -->
  <rect x="20" y="20" width="120" height="60" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="80" y="44" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter 1</text>
  <text x="80" y="62" text-anchor="middle" font-size="11" fill="#555">Channel L</text>

  <!-- Simpliciter 2 -->
  <rect x="20" y="100" width="120" height="60" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="80" y="124" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter 2</text>
  <text x="80" y="142" text-anchor="middle" font-size="11" fill="#555">Channel R</text>

  <!-- Arrows -->
  <line x1="140" y1="50" x2="310" y2="50" stroke="#333" stroke-width="2" marker-end="url(#arr5)"/>
  <line x1="140" y1="130" x2="310" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- Audio OUT stereo -->
  <rect x="310" y="25" width="130" height="130" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="375" y="70" text-anchor="middle" font-weight="bold" font-size="12">Audio OUT</text>
  <text x="375" y="90" text-anchor="middle" font-size="11" fill="#336699">← L  R →</text>
  <text x="375" y="108" text-anchor="middle" font-size="11" fill="#555">stereo output</text>
  <text x="375" y="128" text-anchor="middle" font-size="10" fill="#888">separate speakers</text>

  <!-- Speaker L -->
  <ellipse cx="510" cy="50" rx="30" ry="25" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="510" y="46" text-anchor="middle" font-size="12">🔊</text>
  <text x="510" y="64" text-anchor="middle" font-size="10" fill="#555">Left</text>
  <line x1="440" y1="65" x2="480" y2="55" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Speaker R -->
  <ellipse cx="510" cy="130" rx="30" ry="25" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="510" y="126" text-anchor="middle" font-size="12">🔊</text>
  <text x="510" y="144" text-anchor="middle" font-size="10" fill="#555">Right</text>
  <line x1="440" y1="118" x2="480" y2="128" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/>

  <defs>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
