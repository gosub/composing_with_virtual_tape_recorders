<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" width="580" height="180" font-family="sans-serif" font-size="13">

  <!-- Microphone box -->
  <rect x="10" y="15" width="80" height="78" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="50" y="40"  text-anchor="middle" font-size="18">🎤</text>
  <text x="50" y="62"  text-anchor="middle" font-weight="bold" font-size="12">Micro-</text>
  <text x="50" y="78"  text-anchor="middle" font-weight="bold" font-size="12">phone</text>

  <!-- Output box -->
  <rect x="10" y="107" width="80" height="58" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="50" y="131" text-anchor="middle" font-size="18">🔊</text>
  <text x="50" y="154" text-anchor="middle" font-weight="bold" font-size="12">output</text>

  <!-- Arrow mic → Audio -->
  <line x1="90" y1="54" x2="128" y2="54" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrow Audio → output -->
  <line x1="130" y1="136" x2="92" y2="136" stroke="#333" stroke-width="2" marker-end="url(#arrl)"/>

  <!-- Audio Module -->
  <rect x="130" y="15" width="120" height="150" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="190" y="40"  text-anchor="middle" font-weight="bold" font-size="12">Audio</text>
  <text x="190" y="56"  text-anchor="middle" font-size="10" fill="#555">VCV module</text>
  <text x="190" y="78"  text-anchor="middle" font-size="11" fill="#336699">OUT 1/2 →</text>
  <line x1="150" y1="84" x2="240" y2="84" stroke="#336699" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="190" y="108" text-anchor="middle" font-size="11" fill="#cc6600">← IN 1/2</text>
  <text x="190" y="150" text-anchor="middle" font-size="10" fill="#888">audio interface</text>

  <!-- Arrow Audio OUT → Simpliciter IN (top arc) -->
  <path d="M 250 65 Q 320 28 390 65" fill="none" stroke="#336699" stroke-width="2" marker-end="url(#arrb)"/>
  <text x="320" y="25" text-anchor="middle" font-size="10" fill="#336699">record signal</text>

  <!-- Arrow Simpliciter OUT → Audio IN (bottom arc) -->
  <path d="M 390 118 Q 320 158 250 118" fill="none" stroke="#cc6600" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="320" y="172" text-anchor="middle" font-size="10" fill="#cc6600">playback signal</text>

  <!-- Simpliciter -->
  <rect x="390" y="15" width="130" height="150" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="455" y="44"  text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="455" y="61"  text-anchor="middle" font-size="10" fill="#555">NYSTHI</text>
  <text x="455" y="84"  text-anchor="middle" font-size="11" fill="#336699">← IN L/R</text>
  <line x1="410" y1="90" x2="510" y2="90" stroke="#cc6600" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="455" y="112" text-anchor="middle" font-size="11" fill="#cc6600">OUT L/R →</text>
  <text x="455" y="150" text-anchor="middle" font-size="10" fill="#888">REC / PLAY</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#336699"/>
    </marker>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc6600"/>
    </marker>
  </defs>
</svg>
