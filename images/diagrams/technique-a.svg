<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120" font-family="sans-serif" font-size="13">
  <!-- Technique A: Straight Recording -->
  <!-- Microphone -->
  <rect x="20" y="35" width="100" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="70" y="58" text-anchor="middle" font-weight="bold" font-size="12">Microphone</text>
  <text x="70" y="74" text-anchor="middle" font-size="11" fill="#555">sound source</text>

  <!-- Arrow -->
  <line x1="120" y1="60" x2="155" y2="60" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Audio Module -->
  <rect x="155" y="35" width="110" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="210" y="58" text-anchor="middle" font-weight="bold" font-size="12">Audio</text>
  <text x="210" y="74" text-anchor="middle" font-size="11" fill="#555">VCV module</text>

  <!-- Arrow -->
  <line x1="265" y1="60" x2="300" y2="60" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Simpliciter -->
  <rect x="300" y="20" width="120" height="80" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="360" y="50" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="360" y="66" text-anchor="middle" font-size="11" fill="#555">REC / PLAY</text>
  <text x="360" y="82" text-anchor="middle" font-size="11" fill="#cc6600">IN ← OUT</text>

  <!-- Arrow -->
  <line x1="420" y1="60" x2="455" y2="60" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="455" y="35" width="110" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="510" y="58" text-anchor="middle" font-weight="bold" font-size="12">Audio OUT</text>
  <text x="510" y="74" text-anchor="middle" font-size="11" fill="#555">speakers</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
