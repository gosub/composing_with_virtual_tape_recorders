<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 120" width="580" height="120" font-family="sans-serif" font-size="13">
  <!-- Technique D: Reversal -->

  <!-- Recorded sample -->
  <rect x="20" y="35" width="120" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="80" y="57" text-anchor="middle" font-weight="bold" font-size="12">Recorded</text>
  <text x="80" y="73" text-anchor="middle" font-size="11" fill="#555">Sample (wav)</text>

  <!-- Arrow -->
  <line x1="140" y1="60" x2="185" y2="60" stroke="#333" stroke-width="2" marker-end="url(#arr8)"/>

  <!-- Simpliciter with REVERSE -->
  <rect x="185" y="20" width="140" height="80" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="255" y="46" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="255" y="64" text-anchor="middle" font-size="12" fill="#cc3300" font-weight="bold">◄ REVERSE</text>
  <text x="255" y="80" text-anchor="middle" font-size="11" fill="#555">playhead runs</text>
  <text x="255" y="95" text-anchor="middle" font-size="11" fill="#555">backwards</text>

  <!-- Reverse arrow symbol -->
  <path d="M 340 48 Q 380 20 380 60 Q 380 95 340 75" fill="none" stroke="#cc3300" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr8r)"/>

  <!-- Output -->
  <rect x="400" y="35" width="150" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="475" y="56" text-anchor="middle" font-weight="bold" font-size="12">Audio OUT</text>
  <text x="475" y="72" text-anchor="middle" font-size="11" fill="#cc3300">attack↔decay swapped</text>
  <line x1="325" y1="60" x2="398" y2="60" stroke="#333" stroke-width="2" marker-end="url(#arr8)"/>

  <defs>
    <marker id="arr8" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arr8r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc3300"/>
    </marker>
  </defs>
</svg>
