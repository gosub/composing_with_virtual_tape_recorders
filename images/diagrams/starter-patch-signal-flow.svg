<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 160" width="580" height="160" font-family="sans-serif" font-size="13">

  <!-- Microphone -->
  <rect x="10" y="55" width="80" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="50" y="77" text-anchor="middle" font-weight="bold" font-size="12">Micro-</text>
  <text x="50" y="93" text-anchor="middle" font-weight="bold" font-size="12">phone</text>

  <!-- Arrow mic → audio -->
  <line x1="90" y1="80" x2="128" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Audio Module -->
  <rect x="130" y="20" width="120" height="120" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="190" y="44" text-anchor="middle" font-weight="bold" font-size="12">Audio</text>
  <text x="190" y="60" text-anchor="middle" font-size="10" fill="#555">VCV module</text>
  <text x="190" y="82" text-anchor="middle" font-size="11" fill="#336699">OUT 1/2 →</text>
  <line x1="150" y1="88" x2="240" y2="88" stroke="#336699" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="190" y="108" text-anchor="middle" font-size="11" fill="#cc6600">← IN 1/2</text>
  <text x="190" y="128" text-anchor="middle" font-size="10" fill="#888">audio interface</text>

  <!-- Arrow Audio OUT → Simpliciter IN (top arc) -->
  <path d="M 250 68 Q 320 30 390 68" fill="none" stroke="#336699" stroke-width="2" marker-end="url(#arrb)"/>
  <text x="320" y="27" text-anchor="middle" font-size="10" fill="#336699">record signal</text>

  <!-- Arrow Simpliciter OUT → Audio IN (bottom arc) -->
  <path d="M 390 112 Q 320 148 250 112" fill="none" stroke="#cc6600" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="320" y="158" text-anchor="middle" font-size="10" fill="#cc6600">playback signal</text>

  <!-- Simpliciter -->
  <rect x="390" y="20" width="130" height="120" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="455" y="48" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="455" y="65" text-anchor="middle" font-size="10" fill="#555">NYSTHI</text>
  <text x="455" y="84" text-anchor="middle" font-size="11" fill="#336699">← IN L/R</text>
  <line x1="410" y1="90" x2="510" y2="90" stroke="#cc6600" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="455" y="108" text-anchor="middle" font-size="11" fill="#cc6600">OUT L/R →</text>
  <text x="455" y="128" text-anchor="middle" font-size="10" fill="#888">REC / PLAY</text>

  <!-- Arrow Audio module → Speakers (out the left side, bottom) -->
  <line x1="130" y1="118" x2="92" y2="118" stroke="#333" stroke-width="2" marker-end="url(#arrl)"/>

  <!-- Speakers -->
  <rect x="10" y="103" width="80" height="30" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="50" y="123" text-anchor="middle" font-size="11">🔊 output</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#336699"/>
    </marker>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc6600"/>
    </marker>
    <marker id="arrl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
