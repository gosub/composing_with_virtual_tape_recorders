<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 140" width="680" height="140" font-family="sans-serif" font-size="13">
  <!-- Technique L: Echo/Delay -->

  <!-- Simpliciter -->
  <rect x="20" y="40" width="120" height="60" rx="6" fill="#ffe0cc" stroke="#cc6600" stroke-width="1.5"/>
  <text x="80" y="64" text-anchor="middle" font-weight="bold" font-size="12">Simpliciter</text>
  <text x="80" y="82" text-anchor="middle" font-size="11" fill="#555">dry signal</text>

  <!-- Arrow -->
  <line x1="140" y1="70" x2="200" y2="70" stroke="#333" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Delay module -->
  <rect x="200" y="25" width="140" height="90" rx="6" fill="#f0e8ff" stroke="#664499" stroke-width="1.5"/>
  <text x="270" y="52" text-anchor="middle" font-weight="bold" font-size="12">Chronoblob2</text>
  <text x="270" y="70" text-anchor="middle" font-size="11" fill="#555">TIME: delay length</text>
  <text x="270" y="87" text-anchor="middle" font-size="11" fill="#555">FDBK: repeats</text>
  <text x="270" y="103" text-anchor="middle" font-size="11" fill="#664499">MIX: wet/dry</text>

  <!-- Feedback loop arrow -->
  <path d="M 340 40 Q 390 5 390 70 Q 390 130 340 110" fill="none" stroke="#664499" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr7p)"/>
  <text x="410" y="72" text-anchor="middle" font-size="10" fill="#664499">feedback</text>

  <!-- Arrow to optional saturation -->
  <line x1="340" y1="70" x2="440" y2="70" stroke="#333" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Optional Saturation -->
  <rect x="440" y="45" width="100" height="50" rx="6" fill="#fff0cc" stroke="#aa8800" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="490" y="66" text-anchor="middle" font-size="11" font-style="italic" fill="#aa8800">Console</text>
  <text x="490" y="82" text-anchor="middle" font-size="10" fill="#aa8800">tape warmth</text>

  <!-- Arrow to output -->
  <line x1="540" y1="70" x2="580" y2="70" stroke="#333" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Output -->
  <rect x="580" y="45" width="80" height="50" rx="6" fill="#ddeeff" stroke="#336699" stroke-width="1.5"/>
  <text x="620" y="67" text-anchor="middle" font-weight="bold" font-size="11">Audio</text>
  <text x="620" y="83" text-anchor="middle" font-size="11" fill="#555">OUT</text>

  <defs>
    <marker id="arr7" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arr7p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#664499"/>
    </marker>
  </defs>
</svg>
